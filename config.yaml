# Dust-Storm Onset Prediction — project configuration

project:
  name: dust-storm-forecast-saudi
  study_start: "2018-01-01"
  study_end: "2022-12-31"
  prediction_horizon_hours: 24
  visibility_threshold_m: 1000.0
  albedo_radius_m: 200000
  albedo_doy_window: 15

# Five-year climatological baseline and five-year study period.
baseline_years: [2013, 2014, 2015, 2016, 2017]
study_years: [2018, 2019, 2020, 2021, 2022]

# Eight dust-prone stations spanning central, northern, eastern and
# southern Saudi Arabia (WMO IDs best-effort; coordinates are authoritative).
# isd_usaf/isd_wban are the real NOAA ISD station identifiers matched to each
# coordinate from the NCEI isd-history catalogue (used by --mode real).
stations:
  riyadh:
    wmo_id: "404380"
    wban: "99999"
    lat: 24.93
    lon: 46.72
    isd_usaf: "404370"
    isd_wban: "99999"
  hafar:
    wmo_id: "403730"
    wban: "99999"
    lat: 28.33
    lon: 46.13
    isd_usaf: "403730"
    isd_wban: "99999"
  sharurah:
    wmo_id: "411400"
    wban: "99999"
    lat: 17.47
    lon: 47.12
    isd_usaf: "411360"
    isd_wban: "99999"
  dammam:
    wmo_id: "404160"
    wban: "99999"
    lat: 26.27
    lon: 50.15
    isd_usaf: "404160"
    isd_wban: "99999"
  tabuk:
    wmo_id: "403750"
    wban: "99999"
    lat: 28.37
    lon: 36.60
    isd_usaf: "403750"
    isd_wban: "99999"
  qassim:
    wmo_id: "404050"
    wban: "99999"
    lat: 26.30
    lon: 43.77
    isd_usaf: "404050"
    isd_wban: "99999"
  arar:
    wmo_id: "403570"
    wban: "99999"
    lat: 30.91
    lon: 41.14
    isd_usaf: "403570"
    isd_wban: "99999"
  najran:
    wmo_id: "411370"
    wban: "99999"
    lat: 17.61
    lon: 44.42
    isd_usaf: "411280"
    isd_wban: "99999"

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_final: data/final
  data_synthetic: data/synthetic
  outputs: outputs
  results: results

model:
  target: dust_event_next_day
  group_col: station
  n_cv_splits: 8
  random_state: 42
  n_seeds: 5            # seeds for seed-robustness of model + top driver
  n_bootstrap: 5000
  confidence_level: 0.95
  optuna_trials: 60
  use_optuna: false  # set true for hyperparameter tuning (slower)

era5_variables:
  - 10m_u_component_of_wind
  - 10m_v_component_of_wind
  - 2m_temperature
  - 2m_dewpoint_temperature
  - surface_pressure
  - total_column_water_vapour
  - boundary_layer_height
  - soil_temperature_level_1
  - volumetric_soil_water_layer_1
  - friction_velocity
  - total_precipitation

soil_properties:
  - clay
  - sand
  - silt
  - ocs
  - bdod

# Keyless real-data mode (Open-Meteo ERA5 + ORNL MODIS + NOAA ISD + SoilGrids).
# MODIS is one ORNL request per band per 8-day composite, so the live run is
# bounded by these settings. Override on the CLI with --stations / --study-years
# / --modis-years / --albedo-km. Defaults give a tractable, genuinely-real run.
real:
  stations: [riyadh, hafar, sharurah, dammam, arar, tabuk]
  study_years: [2018, 2019, 2020]
  modis_years: [2017, 2018, 2019, 2020]  # 2017 forms the albedo anomaly baseline
  albedo_km: 20                          # +/- box half-width for the MODIS mean
  n_cv_splits: 6

synthetic:
  enabled: true
  seed: 42
  positive_rate: 0.10
