name: Deploy project page (GitHub Pages)

# ONE-TIME SETUP (repo admin, ~10 s): Settings → Pages → Build and deployment →
# Source = "GitHub Actions". The default GITHUB_TOKEN cannot enable Pages
# programmatically, so this toggle is required once. After that, every push to
# main that touches docs/ publishes https://<owner>.github.io/<repo>/.
# Deploys from the default branch only (so it never adds a red check to PRs).

on:
  push:
    branches: ["main"]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
