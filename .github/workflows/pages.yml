name: Deploy project page (GitHub Pages)

# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# Then every push that touches docs/ publishes the static site.

on:
  push:
    branches: ["main", "claude/satellite-albedo-dust-forecasting-aru3mg"]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Programmatically enable Pages (Actions source) so no manual
          # Settings → Pages toggle is required for the first deploy.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
